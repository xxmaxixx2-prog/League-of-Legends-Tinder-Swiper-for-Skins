name: Update skins.json

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # täglich um 06:00 UTC

permissions:
  contents: write

jobs:
  update-skins:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync-Script ausführen
        run: node ./scripts/sync-skins.mjs

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/skins.json
          git diff --cached --quiet || git commit -m "Update skins.json"

      - name: Änderungen pushen
        run: |
          git push